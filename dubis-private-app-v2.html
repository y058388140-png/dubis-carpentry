<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#7650ad">
  <title>דובי'ס נגרות אישית</title>
  <style>
    :root{--purple:#7650ad;--blue:#6988bc;--turquoise:#62c4c0;--cream:#f7f7f2;--ink:#414155;--muted:#7b7d87;--white:#fff}
    *{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:Arial,"Noto Sans Hebrew",sans-serif}button{font:inherit}
    .app{min-height:100dvh;max-width:540px;margin:auto;background:#fbfaf7;box-shadow:0 0 30px #0001}.screen{display:none;min-height:100dvh;padding-bottom:90px}.screen.active{display:block}
    .hero{min-height:100dvh;display:grid;place-content:center;text-align:center;padding:34px;color:#4d4770;background:radial-gradient(circle at 72% 18%,#fff 0,#f8f8f3 38%,#edeaf4 100%);position:relative;overflow:hidden}.hero::before,.hero::after{content:"";position:absolute;border-radius:45%;opacity:.18}.hero::before{width:330px;height:330px;background:var(--turquoise);top:-120px;right:-135px}.hero::after{width:300px;height:300px;background:var(--purple);bottom:-135px;left:-120px}
    .mark{width:112px;height:112px;margin:0 auto 22px;border:3px solid transparent;background:linear-gradient(#fafaf6,#fafaf6) padding-box,linear-gradient(135deg,var(--purple),var(--turquoise)) border-box;border-radius:28px;display:grid;place-content:center;font-size:52px;box-shadow:0 12px 30px #7650ad26;position:relative;z-index:1}
    h1{font-size:38px;margin:0 0 8px;background:linear-gradient(90deg,var(--purple),var(--blue),var(--turquoise));-webkit-background-clip:text;background-clip:text;color:transparent;position:relative;z-index:1}.tag{color:#77768b;font-size:17px;margin-bottom:38px;position:relative;z-index:1}.primary{border:0;border-radius:14px;background:linear-gradient(90deg,var(--purple),var(--blue),var(--turquoise));color:#fff;padding:15px 32px;font-weight:700;font-size:18px;box-shadow:0 9px 24px #7650ad3b;position:relative;z-index:1}
    header{position:sticky;top:0;z-index:5;background:linear-gradient(90deg,#7551abf5,#6689bcf5,#5fc1bdf5);color:white;padding:18px 18px 15px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(8px)}header h2{margin:0;font-size:22px}.back{border:0;background:#ffffff24;color:white;border-radius:10px;width:40px;height:40px;font-size:25px}
    main{padding:20px}.intro{margin:0 0 18px;color:var(--muted)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{min-height:154px;border:0;border-radius:18px;padding:0;overflow:hidden;color:white;text-align:right;position:relative;box-shadow:0 8px 22px #6d70a326;background:var(--bg)}.card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#ffffff08 15%,#403963c7)}.card .icon{position:absolute;inset:22px 0 auto;text-align:center;font-size:48px;filter:drop-shadow(0 3px 8px #0003)}.card strong{position:absolute;z-index:1;bottom:15px;right:14px;left:10px;font-size:18px}.count{display:block;font-size:12px;font-weight:400;color:#f4f2fa;margin-top:3px}
    .gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px}.photo{aspect-ratio:1;border:0;border-radius:14px;overflow:hidden;padding:0;background:#ddd;position:relative}.photo img{width:100%;height:100%;object-fit:cover}.photo span{position:absolute;inset:auto 0 0;padding:20px 9px 8px;color:white;background:linear-gradient(transparent,#000b);text-align:right;font-size:13px}
    .empty{grid-column:1/-1;padding:60px 15px;text-align:center;color:var(--muted)}.upload{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:6;border:0;border-radius:30px;background:linear-gradient(90deg,var(--purple),var(--blue),var(--turquoise));color:white;padding:14px 23px;font-weight:bold;box-shadow:0 8px 24px #7650ad4a;white-space:nowrap}.upload input{display:none}
    .viewer{position:fixed;z-index:20;inset:0;background:#08100eeF;display:none;align-items:center;justify-content:center}.viewer.open{display:flex}.viewer img{max-width:100%;max-height:88%;object-fit:contain}.close{position:absolute;top:18px;left:18px;border:0;background:#fff2;color:white;border-radius:50%;width:44px;height:44px;font-size:28px}.viewer-title{position:absolute;bottom:20px;color:white;background:#0008;padding:9px 18px;border-radius:20px}
    .note{font-size:12px;text-align:center;color:#81908a;margin-top:22px}@media(min-width:700px){body{padding:25px}.app,.screen{min-height:calc(100dvh - 50px);border-radius:24px;overflow:hidden}.hero{min-height:calc(100dvh - 50px)}}
    .auth-gate{position:fixed;z-index:50;inset:0;background:linear-gradient(145deg,#f9f8f3,#eeeaf6);display:grid;place-content:center;text-align:center;padding:30px}.auth-gate.hidden{display:none}.auth-box{background:white;border-radius:24px;padding:32px 25px;box-shadow:0 16px 45px #7650ad26;max-width:390px}.auth-box h2{margin:15px 0 8px}.auth-box p{color:var(--muted);line-height:1.5}.google{border:1px solid #ddd;border-radius:12px;background:white;padding:13px 22px;font-weight:bold;color:#3c4043;box-shadow:0 3px 10px #0001}.auth-error{color:#b3261e;font-size:13px;margin-top:14px}.userbar{position:fixed;z-index:7;top:12px;left:max(12px,calc(50% - 258px));border:0;border-radius:20px;background:#ffffffdd;color:#625586;padding:7px 12px;font-size:12px;box-shadow:0 3px 12px #0002}.saving{position:fixed;z-index:60;inset:0;background:#ffffffdc;display:none;place-content:center;text-align:center;color:#625586;font-weight:bold}.saving.open{display:grid}
  </style>
</head>
<body><div class="app">
  <section id="home" class="screen active"><div class="hero"><div class="mark">🪵</div><h1>דובי׳ס</h1><div class="tag">נגרות אישית • תכנון • ביצוע</div><button class="primary" onclick="showCatalog()">לצפייה בקטלוג</button></div></section>
  <section id="catalog" class="screen"><header><button class="back" onclick="showHome()">‹</button><h2>קטלוג עבודות</h2></header><main><p class="intro">בחרו קטגוריה לצפייה בעבודות</p><div id="categories" class="grid"></div><p class="note">אפשר להוסיף ולשמור תמונות בכל קטגוריה</p></main></section>
  <section id="galleryScreen" class="screen"><header><button class="back" onclick="showCatalog()">‹</button><h2 id="galleryTitle"></h2></header><main><div id="gallery" class="gallery"></div></main><label class="upload">＋ הוספת תמונות<input id="fileInput" type="file" accept="image/*" multiple></label></section>
</div>
<div id="viewer" class="viewer" onclick="if(event.target===this)closeViewer()"><button class="close" onclick="closeViewer()">×</button><img id="viewerImg" alt=""><div id="viewerTitle" class="viewer-title"></div></div>
<div id="authGate" class="auth-gate"><div class="auth-box"><div style="font-size:55px">🪵</div><h2>דובי׳ס נגרות אישית</h2><p>הקטלוג פרטי. הכניסה למשתמשים מאושרים בלבד.</p><button id="googleLogin" class="google">כניסה באמצעות Google</button><div id="authError" class="auth-error"></div></div></div>
<button id="userbar" class="userbar" hidden>יציאה</button><div id="saving" class="saving">שומר את התמונות…</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, query, where, limit, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js';

const firebaseConfig={apiKey:'AIzaSyB-Qs4S_UaZ5MKyC_-iVcRQ5_CxHOD65dM',authDomain:'dubis-carpentry.firebaseapp.com',projectId:'dubis-carpentry',storageBucket:'dubis-carpentry.firebasestorage.app',messagingSenderId:'223449530915',appId:'1:223449530915:web:83f1999e2cbd94fede2796'};
const firebaseApp=initializeApp(firebaseConfig),auth=getAuth(firebaseApp),cloud=getFirestore(firebaseApp);
const cats=[
 {id:'kitchens',name:'מטבחים',icon:'🍳',bg:'linear-gradient(135deg,#7650ad,#6988bc)'},
 {id:'closets',name:'ארונות',icon:'🚪',bg:'linear-gradient(135deg,#6988bc,#62c4c0)'},
 {id:'bedrooms',name:'חדרי שינה',icon:'🛏️',bg:'linear-gradient(135deg,#8a64b9,#7899c8)'},
 {id:'kids',name:'חדרי ילדים',icon:'🧸',bg:'linear-gradient(135deg,#7297c6,#65c5c0)'},
 {id:'tv',name:'מזנונים',icon:'📺',bg:'linear-gradient(135deg,#7650ad,#817bbb)'},
 {id:'libraries',name:'ספריות ופינות עבודה',icon:'📚',bg:'linear-gradient(135deg,#657fb5,#60bbb9)'},
 {id:'bath',name:'חדרי רחצה',icon:'🛁',bg:'linear-gradient(135deg,#7172b5,#60c5bf)'}
];
let current=null,currentUser=null;
const home=document.getElementById('home'),catalog=document.getElementById('catalog'),galleryScreen=document.getElementById('galleryScreen'),categories=document.getElementById('categories'),gallery=document.getElementById('gallery'),galleryTitle=document.getElementById('galleryTitle'),fileInput=document.getElementById('fileInput'),viewer=document.getElementById('viewer'),viewerImg=document.getElementById('viewerImg'),viewerTitle=document.getElementById('viewerTitle'),authGate=document.getElementById('authGate'),authError=document.getElementById('authError'),userbar=document.getElementById('userbar');
const screens=[home,catalog,galleryScreen];
function show(id){screens.forEach(x=>x.classList.toggle('active',x.id===id));scrollTo(0,0)}
window.showHome=()=>show('home');window.showCatalog=()=>{renderCategories();show('catalog')};
async function count(cat){if(!currentUser)return 0;const snap=await getDocs(query(collection(cloud,'photos'),where('category','==',cat)));return snap.size}
async function renderCategories(){categories.innerHTML='';for(const c of cats){const n=await count(c.id);const b=document.createElement('button');b.className='card';b.style.setProperty('--bg',c.bg);b.innerHTML=`<span class="icon">${c.icon}</span><strong>${c.name}<span class="count">${n?n+' תמונות':'עדיין אין תמונות'}</span></strong>`;b.onclick=()=>openCategory(c);categories.appendChild(b)}}
function openCategory(c){current=c;galleryTitle.textContent=c.name;show('galleryScreen');renderGallery()}
async function getPhotos(cat){const snap=await getDocs(query(collection(cloud,'photos'),where('category','==',cat)));return snap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.imageData).sort((a,b)=>(b.created||0)-(a.created||0))}
async function renderGallery(){gallery.innerHTML='<div class="empty">טוען תמונות…</div>';try{const items=await getPhotos(current.id);gallery.innerHTML='';if(!items.length){gallery.innerHTML='<div class="empty"><div style="font-size:48px">📷</div><h3>עוד אין תמונות בקטגוריה</h3><p>לחצו למטה על „הוספת תמונות”</p></div>';return}items.forEach(p=>{const b=document.createElement('button');b.className='photo';b.innerHTML=`<img src="${p.imageData}" alt="${p.title||''}"><span>${p.title||''}</span>`;b.onclick=()=>openViewer(p.imageData,p.title||'');gallery.appendChild(b)})}catch(e){gallery.innerHTML='<div class="empty">לא ניתן לטעון תמונות. נסה לרענן.</div>'}}
function compress(file){return new Promise((ok,bad)=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height,max=1100;if(w>max||h>max){const r=Math.min(max/w,max/h);w=Math.round(w*r);h=Math.round(h*r)}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);ok(c.toDataURL('image/jpeg',.68))};img.onerror=bad;img.src=url})}
fileInput.onchange=async e=>{if(!currentUser)return;document.getElementById('saving').classList.add('open');try{for(const f of e.target.files){const imageData=await compress(f);if(imageData.length>900000)throw new Error('large');await addDoc(collection(cloud,'photos'),{category:current.id,title:f.name.replace(/\.[^.]+$/,''),imageData,created:Date.now(),createdAt:serverTimestamp(),owner:currentUser.email})}await renderGallery();await renderCategories()}catch(err){alert('אחת התמונות גדולה מדי או שלא ניתן לשמור אותה. נסה תמונה אחרת.')}finally{e.target.value='';document.getElementById('saving').classList.remove('open')}};
function openViewer(src,title){viewerImg.src=src;viewerTitle.textContent=title;viewer.classList.add('open')}window.closeViewer=()=>viewer.classList.remove('open');
document.getElementById('googleLogin').onclick=async()=>{authError.textContent='';try{await signInWithPopup(auth,new GoogleAuthProvider())}catch(e){authError.textContent='הכניסה נכשלה. ודא שבחרת חשבון מאושר.'}};
document.getElementById('userbar').onclick=()=>signOut(auth);
onAuthStateChanged(auth,async user=>{const email=(user?.email||'').toLowerCase();if(!user){currentUser=null;authGate.classList.remove('hidden');userbar.hidden=true;show('home');return}try{await getDocs(query(collection(cloud,'photos'),limit(1)));currentUser=user;authGate.classList.add('hidden');userbar.hidden=false;userbar.textContent='יציאה • '+email;renderCategories()}catch(e){authError.textContent='החשבון הזה אינו מורשה להיכנס.';await signOut(auth)}});
</script></body></html>
