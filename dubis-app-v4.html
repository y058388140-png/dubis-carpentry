<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, getDoc, getCountFromServer, setDoc, updateDoc, deleteDoc, doc, query, where, limit, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js';

const firebaseConfig={apiKey:'AIzaSyB-Qs4S_UaZ5MKyC_-iVcRQ5_CxHOD65dM',authDomain:'dubis-carpentry.firebaseapp.com',projectId:'dubis-carpentry',storageBucket:'dubis-carpentry.firebasestorage.app',messagingSenderId:'223449530915',appId:'1:223449530915:web:83f1999e2cbd94fede2796'};
const firebaseApp=initializeApp(firebaseConfig),auth=getAuth(firebaseApp),cloud=getFirestore(firebaseApp);
const defaultCats=[
 {id:'kitchens',name:'מטבחים',order:1,coverPosition:0},
 {id:'closets',name:'ארונות',order:2,coverPosition:1},
 {id:'bedrooms',name:'חדרי שינה',order:3,coverPosition:2},
 {id:'kids',name:'חדרי ילדים',order:4,coverPosition:3},
 {id:'tv',name:'מזנונים',order:5,coverPosition:4},
 {id:'libraries',name:'ספריות ופינות עבודה',order:6,coverPosition:5},
 {id:'bath',name:'חדרי רחצה',order:7,coverPosition:6}
];
let cats=[...defaultCats];
let current=null,currentUser=null,currentRole='viewer',selectedPhoto=null,viewerItems=[],viewerIndex=0,viewerTouchX=0,selectionMode=false;
const selectedPhotos=new Map();
const adminEmails=['4122615@gmail.com','y058388140@gmail.com'];
const byId=id=>document.getElementById(id);const home=byId('home'),catalog=byId('catalog'),galleryScreen=byId('galleryScreen'),categories=byId('categories'),gallery=byId('gallery'),galleryTitle=byId('galleryTitle'),fileInput=byId('fileInput'),viewer=byId('viewer'),viewerImg=byId('viewerImg'),viewerTitle=byId('viewerTitle'),authGate=byId('authGate'),authError=byId('authError'),userbar=byId('userbar'),manageUsersBtn=byId('manageUsersBtn'),manageCategoriesBtn=byId('manageCategoriesBtn'),searchInput=byId('searchInput'),searchSection=byId('searchSection'),searchResults=byId('searchResults'),categorySection=byId('categorySection'),editModal=byId('editModal'),editTitle=byId('editTitle'),editCategory=byId('editCategory'),saveEdit=byId('saveEdit'),rotatePhoto=byId('rotatePhoto'),deletePhoto=byId('deletePhoto'),closeEdit=byId('closeEdit'),usersModal=byId('usersModal'),usersList=byId('usersList'),newUserEmail=byId('newUserEmail'),newUserRole=byId('newUserRole'),addUser=byId('addUser'),closeUsers=byId('closeUsers'),categoriesModal=byId('categoriesModal'),categoryList=byId('categoryList'),newCategoryName=byId('newCategoryName'),addCategory=byId('addCategory'),closeCategories=byId('closeCategories'),selectPhotosBtn=byId('selectPhotosBtn'),shareBar=byId('shareBar'),shareCount=byId('shareCount'),shareSelected=byId('shareSelected'),cancelSelection=byId('cancelSelection');
const screens=[home,catalog,galleryScreen];
function show(id){screens.forEach(x=>x.classList.toggle('active',x.id===id));scrollTo(0,0)}
window.showHome=()=>show('home');window.showCatalog=()=>{renderCategories();show('catalog')};
async function loadCategories(){
 let snap=await getDocs(collection(cloud,'categories'));
 if(currentRole==='admin'){
  const existing=new Set(snap.docs.map(d=>d.id));
  for(const c of defaultCats)if(!existing.has(c.id))await setDoc(doc(cloud,'categories',c.id),c);
  snap=await getDocs(collection(cloud,'categories'));
 }
 const unique=new Map();
 for(const d of snap.docs){const data=d.data(),effectiveId=data.id||d.id,item={...data,id:effectiveId,_canonical:d.id===effectiveId};const old=unique.get(effectiveId);if(!old||item._canonical)unique.set(effectiveId,item)}
 cats=[...unique.values()].map(({_canonical,...c})=>c).filter(c=>c.name).sort((a,b)=>(a.order||999)-(b.order||999));
 if(!cats.length)cats=[...defaultCats];
}
async function renderCategories(){
 categories.innerHTML='';
 const jobs=cats.map(c=>{
  const defaultPosition=defaultCats.find(x=>x.id===c.id)?.coverPosition,b=document.createElement('button');
  b.className='card';
  if(Number.isInteger(defaultPosition)){b.style.backgroundImage='url("./category-covers.jpg")';b.style.backgroundSize='700% 100%';b.style.backgroundPosition=`${defaultPosition*100/6}% center`}else b.style.backgroundImage='linear-gradient(135deg,#7650ad,#62c4c0)';
  b.innerHTML=`<strong>${c.name}<span class="count">טוען…</span></strong>`;b.onclick=()=>openCategory(c);categories.appendChild(b);
  return (async()=>{try{const q=query(collection(cloud,'photos'),where('category','==',c.id)),[countSnap,coverSnap]=await Promise.all([getCountFromServer(q),getDocs(query(collection(cloud,'photos'),where('category','==',c.id),limit(1)))]),n=countSnap.data().count,cover=coverSnap.docs[0]?.data();b.querySelector('.count').textContent=n?n+' תמונות':'עדיין אין תמונות';if(cover?.imageData){b.style.backgroundImage=`url("${cover.imageData}")`;b.style.backgroundSize='cover';b.style.backgroundPosition='center'}}catch(e){b.querySelector('.count').textContent='לחץ לצפייה'}})();
 });
 await Promise.allSettled(jobs);
}
function openCategory(c){current=c;galleryTitle.textContent=c.name;show('galleryScreen');renderGallery()}
async function getPhotos(cat){const snap=await getDocs(query(collection(cloud,'photos'),where('category','==',cat)));return snap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.imageData).sort((a,b)=>(b.created||0)-(a.created||0))}
async function renderGallery(){gallery.innerHTML='<div class="empty">טוען תמונות…</div>';try{const items=await getPhotos(current.id);gallery.innerHTML='';if(!items.length){gallery.innerHTML='<div class="empty"><div style="font-size:48px">📷</div><h3>עוד אין תמונות בקטגוריה</h3><p>לחצו למטה על „הוספת תמונות”</p></div>';return}items.forEach((p,i)=>{const box=document.createElement('div');box.className='photo'+(selectedPhotos.has(p.id)?' selected':'');box.innerHTML=`<img src="${p.imageData}" alt="${p.title||''}"><span>${p.title||''}</span>${selectionMode?`<button class="photo-select">${selectedPhotos.has(p.id)?'✓':''}</button>`:(currentRole!=='viewer'?'<button class="photo-edit">✎</button>':'')}`;const choose=()=>selectionMode?toggleSelected(p,box):openViewer(items,i);box.querySelector('img').onclick=choose;box.querySelector('span').onclick=choose;box.querySelector('.photo-select')?.addEventListener('click',e=>{e.stopPropagation();toggleSelected(p,box)});box.querySelector('.photo-edit')?.addEventListener('click',()=>openEdit(p));gallery.appendChild(box)})}catch(e){gallery.innerHTML='<div class="empty">לא ניתן לטעון תמונות. נסה לרענן.</div>'}}
function updateSelectionUI(){shareBar.hidden=!selectionMode;shareCount.textContent=selectedPhotos.size+' תמונות נבחרו';selectPhotosBtn.textContent=selectionMode?'סיום בחירה':'בחירת תמונות';document.querySelector('.upload').style.display=selectionMode||currentRole==='viewer'?'none':'block'}
function toggleSelected(p,box){if(!selectedPhotos.has(p.id)&&selectedPhotos.size>=20)return alert('אפשר לבחור עד 20 תמונות בכל שליחה.');if(selectedPhotos.has(p.id))selectedPhotos.delete(p.id);else selectedPhotos.set(p.id,p);box.classList.toggle('selected',selectedPhotos.has(p.id));const mark=box.querySelector('.photo-select');if(mark)mark.textContent=selectedPhotos.has(p.id)?'✓':'';updateSelectionUI()}
selectPhotosBtn.onclick=()=>{selectionMode=!selectionMode;if(!selectionMode)selectedPhotos.clear();updateSelectionUI();renderGallery()};
cancelSelection.onclick=()=>{selectionMode=false;selectedPhotos.clear();updateSelectionUI();if(galleryScreen.classList.contains('active'))renderGallery()};
function safeFileName(name,index){return ((name||'תמונה-'+(index+1)).replace(/[\\/:*?"<>|]/g,'-').trim()||'תמונה-'+(index+1))+'.jpg'}
shareSelected.onclick=async()=>{if(!selectedPhotos.size)return alert('בחר לפחות תמונה אחת.');const old=shareSelected.textContent;shareSelected.disabled=true;shareSelected.textContent='מכין…';try{const files=[];let i=0;for(const p of selectedPhotos.values()){const blob=await (await fetch(p.imageData)).blob();files.push(new File([blob],safeFileName(p.title,i++),{type:'image/jpeg'}))}if(navigator.share&&(!navigator.canShare||navigator.canShare({files})))await navigator.share({title:'תמונות עבודות נגרות',text:'דובי׳ס נגרות אישית',files});else{files.forEach((file,n)=>{setTimeout(()=>{const url=URL.createObjectURL(file),a=document.createElement('a');a.href=url;a.download=file.name;a.click();setTimeout(()=>URL.revokeObjectURL(url),2000)},n*250)});alert('המכשיר אינו תומך בשיתוף ישיר. התמונות הורדו ואפשר לצרף אותן להודעה.')} }catch(e){if(e.name!=='AbortError')alert('לא ניתן לשתף את התמונות במכשיר הזה. נסה לבחור פחות תמונות.')}finally{shareSelected.disabled=false;shareSelected.textContent=old}};
function compress(file){return new Promise((ok,bad)=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height,max=1100;if(w>max||h>max){const r=Math.min(max/w,max/h);w=Math.round(w*r);h=Math.round(h*r)}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);ok(c.toDataURL('image/jpeg',.68))};img.onerror=bad;img.src=url})}
fileInput.onchange=async e=>{if(!currentUser||currentRole==='viewer')return;document.getElementById('saving').classList.add('open');try{for(const f of e.target.files){const suggested=f.name.replace(/\.[^.]+$/,'');const title=prompt('מה שם התמונה?',suggested);if(title===null)continue;const imageData=await compress(f);if(imageData.length>900000)throw new Error('large');await addDoc(collection(cloud,'photos'),{category:current.id,title:title.trim()||suggested,imageData,created:Date.now(),createdAt:serverTimestamp(),owner:currentUser.email})}await renderGallery();await renderCategories()}catch(err){alert('אחת התמונות גדולה מדי או שלא ניתן לשמור אותה. נסה תמונה אחרת.')}finally{e.target.value='';document.getElementById('saving').classList.remove('open')}};
function openViewer(items,index=0){viewerItems=items;viewerIndex=index;showViewerPhoto();viewer.classList.add('open')}
function showViewerPhoto(){const p=viewerItems[viewerIndex];if(!p)return;viewerImg.src=p.imageData;viewerTitle.textContent=p.title||'';byId('viewerPrev').disabled=viewerItems.length<2;byId('viewerNext').disabled=viewerItems.length<2}
function moveViewer(step){if(viewerItems.length<2)return;viewerIndex=(viewerIndex+step+viewerItems.length)%viewerItems.length;showViewerPhoto()}
byId('viewerPrev').onclick=e=>{e.stopPropagation();moveViewer(-1)};byId('viewerNext').onclick=e=>{e.stopPropagation();moveViewer(1)};
viewer.addEventListener('touchstart',e=>viewerTouchX=e.changedTouches[0].clientX,{passive:true});viewer.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-viewerTouchX;if(Math.abs(dx)>45)moveViewer(dx<0?1:-1)},{passive:true});
document.addEventListener('keydown',e=>{if(!viewer.classList.contains('open'))return;if(e.key==='Escape')closeViewer();if(e.key==='ArrowLeft')moveViewer(1);if(e.key==='ArrowRight')moveViewer(-1)});
window.closeViewer=()=>viewer.classList.remove('open');
document.getElementById('googleLogin').onclick=async()=>{authError.textContent='';try{const provider=new GoogleAuthProvider();provider.setCustomParameters({prompt:'select_account'});await signInWithPopup(auth,provider)}catch(e){authError.textContent='הכניסה נכשלה. נסה שוב ובחר חשבון מאושר.'}};
document.getElementById('userbar').onclick=()=>signOut(auth);
function openEdit(p){selectedPhoto=p;editTitle.value=p.title||'';editCategory.innerHTML=cats.map(c=>`<option value="${c.id}" ${c.id===p.category?'selected':''}>${c.name}</option>`).join('');editModal.classList.add('open')}
closeEdit.onclick=()=>editModal.classList.remove('open');saveEdit.onclick=async()=>{await updateDoc(doc(cloud,'photos',selectedPhoto.id),{title:editTitle.value.trim(),category:editCategory.value});editModal.classList.remove('open');renderGallery();renderCategories()};
deletePhoto.onclick=async()=>{if(confirm('למחוק את התמונה לצמיתות?')){await deleteDoc(doc(cloud,'photos',selectedPhoto.id));editModal.classList.remove('open');renderGallery();renderCategories()}};
rotatePhoto.onclick=async()=>{const img=new Image();img.onload=async()=>{const c=document.createElement('canvas');c.width=img.height;c.height=img.width;const x=c.getContext('2d');x.translate(c.width/2,c.height/2);x.rotate(Math.PI/2);x.drawImage(img,-img.width/2,-img.height/2);await updateDoc(doc(cloud,'photos',selectedPhoto.id),{imageData:c.toDataURL('image/jpeg',.68)});editModal.classList.remove('open');renderGallery()};img.src=selectedPhoto.imageData};
manageUsersBtn.onclick=async()=>{usersModal.classList.add('open');renderUsers()};closeUsers.onclick=()=>usersModal.classList.remove('open');
let searchTimer;searchInput.oninput=()=>{clearTimeout(searchTimer);searchTimer=setTimeout(runSearch,250)};async function runSearch(){const term=searchInput.value.trim().toLowerCase();if(!term){searchSection.hidden=true;categorySection.hidden=false;return}searchSection.hidden=false;categorySection.hidden=true;searchResults.innerHTML='<div class="empty">מחפש…</div>';const snap=await getDocs(collection(cloud,'photos'));const items=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>(p.title||'').toLowerCase().includes(term));searchResults.innerHTML=items.length?'':'<div class="empty">לא נמצאו תמונות בשם הזה</div>';items.forEach((p,i)=>{const box=document.createElement('div');box.className='photo';box.innerHTML=`<img src="${p.imageData}" alt="${p.title||''}"><span>${p.title||''}</span>${currentRole!=='viewer'?'<button class="photo-edit">✎</button>':''}`;box.querySelector('img').onclick=()=>openViewer(items,i);box.querySelector('span').onclick=()=>openViewer(items,i);box.querySelector('.photo-edit')?.addEventListener('click',()=>openEdit(p));searchResults.appendChild(box)})}
async function renderUsers(){const snap=await getDocs(collection(cloud,'allowedUsers'));usersList.innerHTML=snap.docs.map(d=>`<div class="user-row"><span>${d.id}</span><small>${d.data().role==='editor'?'עורך':'צופה'}</small><button data-email="${d.id}">הסרה</button></div>`).join('')||'<p>אין משתמשים נוספים.</p>';usersList.querySelectorAll('button').forEach(b=>b.onclick=async()=>{if(confirm('להסיר את ההרשאה?')){await deleteDoc(doc(cloud,'allowedUsers',b.dataset.email));renderUsers()}})}
addUser.onclick=async()=>{const email=newUserEmail.value.trim().toLowerCase();if(!email.includes('@'))return alert('הזן כתובת Gmail תקינה');await setDoc(doc(cloud,'allowedUsers',email),{email,role:newUserRole.value,active:true,addedAt:serverTimestamp()});newUserEmail.value='';renderUsers()};
manageCategoriesBtn.onclick=async()=>{await loadCategories();renderCategoryManager();categoriesModal.classList.add('open')};closeCategories.onclick=()=>categoriesModal.classList.remove('open');
function renderCategoryManager(){categoryList.innerHTML=cats.map((c,i)=>`<div class="category-row"><span>${c.name}</span><button data-action="up" data-id="${c.id}" ${i===0?'disabled':''}>↑</button><button data-action="down" data-id="${c.id}" ${i===cats.length-1?'disabled':''}>↓</button><button data-action="rename" data-id="${c.id}">שינוי שם</button><button data-action="delete" data-id="${c.id}">מחיקה</button></div>`).join('');categoryList.querySelectorAll('button').forEach(b=>b.onclick=()=>categoryAction(b.dataset.action,b.dataset.id))}
async function categoryAction(action,id){const i=cats.findIndex(c=>c.id===id),c=cats[i];if(action==='rename'){const name=prompt('שם הקטגוריה',c.name);if(name?.trim())await updateDoc(doc(cloud,'categories',id),{name:name.trim()})}if(action==='up'&&i>0){await updateDoc(doc(cloud,'categories',id),{order:i});await updateDoc(doc(cloud,'categories',cats[i-1].id),{order:i+1})}if(action==='down'&&i<cats.length-1){await updateDoc(doc(cloud,'categories',id),{order:i+2});await updateDoc(doc(cloud,'categories',cats[i+1].id),{order:i+1})}if(action==='delete'){const p=await getDocs(query(collection(cloud,'photos'),where('category','==',id),limit(1)));if(!p.empty)return alert('יש תמונות בקטגוריה. העבר או מחק אותן לפני מחיקת הקטגוריה.');if(confirm(`למחוק את הקטגוריה ${c.name}?`))await deleteDoc(doc(cloud,'categories',id))}await loadCategories();renderCategoryManager();renderCategories()}
addCategory.onclick=async()=>{const name=newCategoryName.value.trim();if(!name)return alert('כתוב שם לקטגוריה');const id='custom-'+Date.now();await setDoc(doc(cloud,'categories',id),{name,order:cats.length+1,createdAt:serverTimestamp()});newCategoryName.value='';await loadCategories();renderCategoryManager();renderCategories()};
onAuthStateChanged(auth,async user=>{const email=(user?.email||'').toLowerCase();if(!user){currentUser=null;authGate.classList.remove('hidden');userbar.hidden=true;selectPhotosBtn.hidden=true;show('home');return}try{if(adminEmails.includes(email))currentRole='admin';else{const access=await getDoc(doc(cloud,'allowedUsers',email));if(!access.exists()||!access.data().active)throw new Error('denied');currentRole=access.data().role||'viewer'}currentUser=user;authGate.classList.add('hidden');userbar.hidden=false;userbar.textContent='יציאה • '+email;manageUsersBtn.hidden=currentRole!=='admin';manageCategoriesBtn.hidden=currentRole!=='admin';selectPhotosBtn.hidden=currentRole==='viewer';document.querySelector('.upload').style.display=currentRole==='viewer'?'none':'block';cats=[...defaultCats];renderCategories();try{await Promise.race([loadCategories(),new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),5000))]);renderCategories()}catch(e){/* קטגוריות ברירת המחדל כבר מוצגות */}}catch(e){authError.textContent='החשבון הזה אינו מורשה להיכנס.';await signOut(auth)}});
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script></body></html>
